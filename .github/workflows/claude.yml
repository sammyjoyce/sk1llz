name: Claude Code

# Agent mode (prompt-driven). Still gated on @claude mentions by the job `if:`,
# but once triggered Claude follows the prompt template below rather than
# free-form parsing the comment body. Pair with claude-pr-review.yml, which
# handles automatic review on every PR open/update.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Never trigger on bot-authored events. Third-party AI reviewer bots
    # (gemini-code-assist, devin, copilot, etc.) routinely mention "@claude"
    # in their review text and would otherwise kick off this workflow, which
    # GitHub then gates with `action_required` for first-time bot runs.
    if: |
      github.event.sender.type != 'Bot' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Single updating comment per PR instead of thread noise.
          use_sticky_comment: true

          # Commits by Claude show as verified (signed via GitHub API).
          # Tradeoff: cannot rebase/cherry-pick. Swap for ssh_signing_key if you need those.
          use_commit_signing: true

          # Unlock mcp__github_ci__* tools so Claude can read CI runs and job logs.
          # Requires the matching `actions: read` permission above.
          additional_permissions: |
            actions: read

          # Agent-mode prompt: the job `if:` already gates on @claude, so this
          # block runs only after a mention. We pass the triggering text in as
          # context since agent mode doesn't auto-extract it.
          prompt: |
            REPO: ${{ github.repository }}
            NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
            EVENT: ${{ github.event_name }}
            AUTHOR: ${{ github.actor }}

            USER REQUEST (the @claude mention that triggered this run):
            ${{ github.event.comment.body || github.event.review.body || github.event.issue.body || github.event.issue.title }}

            You've been tagged on sk1llz — a curated collection of agent skill
            definitions (YAML frontmatter + Markdown) plus Rust tooling. Read
            the USER REQUEST above and help them. The PR branch (if any) is
            already checked out in the working directory.

            ## Repo layout
            - Skill definitions live under: domains/, languages/, organizations/, paradigms/, specialists/
            - Rust CLI and tools: cli/ and tools/sk1llz-dna/
            - Validation scripts: scripts/ and meta/validation/
            - See CONTRIBUTING.md for the SKILL.md frontmatter format (name, description ≤200 chars).

            ## Non-negotiable conventions
            1. After modifying any SKILL.md, regenerate the manifest:
                 python scripts/generate_manifest.py
               and commit the resulting skills.json. CI's validate-manifest job
               will fail otherwise.
            2. Validate skills with:
                 python meta/validation/validate.py
            3. Rust changes must pass, in the relevant crate directory:
                 cargo fmt --all -- --check
                 cargo clippy -- -D warnings
                 cargo test
            4. Don't silently broaden error types, swallow Results, or skip tests.

            ## How to respond
            - Code-specific feedback on a PR → mcp__github_inline_comment__create_inline_comment with confirmed: true
            - Summaries / answers to questions → gh pr comment (or leave the sticky comment as the single reply)
            - When making code changes, run the relevant validation commands before committing.
            - Keep responses tight and high-signal.

          # Scope tools. Read/Edit/Write and read-only git are available by
          # default and are not listed here. Bash is disabled by default —
          # only the specific commands below run.
          claude_args: |
            --max-turns 15
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash(cargo check),Bash(cargo check:*),Bash(cargo test:*),Bash(cargo fmt:*),Bash(cargo clippy:*),Bash(cargo build:*),Bash(python scripts/generate_manifest.py),Bash(python meta/validation/validate.py),Bash(python scripts/enrich_tags.py),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh issue view:*)"
