name: Claude Auto Review

# Runs automatically on every PR open/update — no @claude mention required.
# Uses agent mode (via the `prompt` input) instead of interactive tag mode.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    # Skip drafts and avoid loops on Claude's own PRs.
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'claude[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Run Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # One updating comment across the lifetime of the PR.
          use_sticky_comment: true

          # Bring back v0.x-style tracking comment with progress checkboxes.
          track_progress: true

          # Let Claude read CI runs, job logs, and check results.
          additional_permissions: |
            actions: read

          # Agent-mode prompt: fires automatically, no @claude mention needed.
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            PR TITLE: ${{ github.event.pull_request.title }}
            AUTHOR: ${{ github.event.pull_request.user.login }}

            Review this pull request for sk1llz, a curated collection of agent
            skill definitions (YAML frontmatter + Markdown) plus Rust tooling.

            The PR branch is already checked out in the working directory.

            ## Skill definition changes
            Skills live under: domains/, languages/, organizations/, paradigms/, specialists/.
            - Verify SKILL.md frontmatter follows CONTRIBUTING.md (name, description ≤200 chars)
            - If any SKILL.md was added or modified, confirm skills.json was regenerated.
              If unsure, run: python scripts/generate_manifest.py
              (only the generated_at timestamp should differ — matches CI's check)
            - Validate all skills: python meta/validation/validate.py

            ## Rust changes (cli/ or tools/sk1llz-dna/)
            - Run cargo fmt --all -- --check in the relevant crate
            - Run cargo clippy -- -D warnings
            - Run cargo test
            - Flag silently broadened error types or swallowed Results

            ## General review
            - Obvious bugs, logic errors, security issues
            - Unused code or dead imports
            - Missing tests for new behavior (where reasonable)

            ## How to deliver feedback
            - Line-specific issues → mcp__github_inline_comment__create_inline_comment with confirmed: true
            - Overall summary → a single gh pr comment at the end
            - Keep the review high-signal. Don't nitpick what tooling already enforces.
            - If CI failed, read the failing job log and explain the root cause.

          claude_args: |
            --max-turns 20
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash(cargo check),Bash(cargo check:*),Bash(cargo test:*),Bash(cargo fmt:*),Bash(cargo clippy:*),Bash(cargo build:*),Bash(python scripts/generate_manifest.py),Bash(python meta/validation/validate.py),Bash(python scripts/enrich_tags.py),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh issue view:*)"
